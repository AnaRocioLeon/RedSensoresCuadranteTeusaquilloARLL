<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Gráfico: Red de Sensores - Cuadrante E13C05020</title>
    <style>
        :root {
            --primary-color: #1e293b;
            --layer4-color: #0284c7;
            --layer3-color: #0d9488;
            --layer2-color: #d97706;
            --layer1-color: #dc2626;
            --text-light: #f8fafc;
            --bg-main: #0f172a;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ENCABEZADO INSTITUCIONAL */
        .institutional-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px 30px;
            width: 100%;
            max-width: 890px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            gap: 20px;
        }

        .header-logo {
            height: 110px;
            width: auto;
        }

        .header-text-container {
            flex-grow: 1;
            text-align: right;
        }

        .header-text-container h1 {
            color: var(--accent);
            margin: 0 0 5px 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-text-container .subtitle {
            color: #34d399;
            margin: 0 0 15px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .academic-info {
            border-top: 1px dashed #475569;
            padding-top: 10px;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .academic-info strong {
            color: #e2e8f0;
        }

        /* MENÚS DE BOTONES */
        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 950px;
        }

        .nav-btn {
            background-color: #1e293b;
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--accent);
            color: var(--bg-main);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .nav-menu.bottom {
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .nav-btn.secondary {
            border-color: #475569;
            background-color: #0f172a;
        }
        .nav-btn.secondary:hover {
            background-color: #e2e8f0;
            color: #0f172a;
            border-color: #e2e8f0;
        }

        /* ARQUITECTURA CONTENEDOR */
        .architecture-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 950px;
        }

        .layer-card {
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            position: relative;
            border-left: 8px solid;
            background-color: #1e293b;
        }

        .layer-4 { border-left-color: var(--layer4-color); }
        .layer-3 { border-left-color: var(--layer3-color); }
        .layer-2 { border-left-color: var(--layer2-color); }
        .layer-1 { border-left-color: var(--layer1-color); }

        .layer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .layer-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .layer-4 .layer-title { color: #38bdf8; }
        .layer-3 .layer-title { color: #2dd4bf; }
        .layer-2 .layer-title { color: #fbbf24; }
        .layer-1 .layer-title { color: #f87171; }

        .layer-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #334155;
            font-weight: bold;
        }

        .grid-elements {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .element-box {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .element-box strong {
            display: block;
            color: #e2e8f0;
            margin-bottom: 4px;
            border-bottom: 1px dashed #334155;
            padding-bottom: 2px;
        }

        .critical-alert {
            border: 1px solid var(--layer1-color);
            background-color: rgba(220, 38, 38, 0.1);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .flow-indicator {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            font-weight: bold;
            margin: -5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

            height: 2px;
            background: linear-gradient(90deg, transparent, #33
