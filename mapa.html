<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Despliegue de Red - Cuadrante E13C05020</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f19; color: #f8fafc; padding: 30px 10px; display: flex; flex-direction: column; align-items: center; margin:0; }
        .map-container { width: 100%; max-width: 1050px; background: #1e293b; padding: 25px; border-radius: 16px; border: 2px solid #10b981; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #10b981; text-align: center; margin: 0 0 10px 0; text-transform: uppercase; font-size: 22px; }
        #map { width: 100%; height: 580px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        .legend { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; background: #111827; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid #fff; }
        
        /* Estilo para la etiqueta personalizada del CAI Parkway */
        .cai-label {
            background: #1e293b;
            color: #38bdf8;
            border: 2px solid #38bdf8;
            border-radius: 6px;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <h1>📍 Despliegue Cartográfico de Nodos Tecnológicos</h1>
        <p style="text-align: center; font-size: 13px; color: #94a3b8; margin: 0 0 20px 0;">Distribución geoespacial sobre el Cuadrante E13C05020 de la Policía Metropolitana de Bogotá.</p>
        
        <div id="map"></div>

        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#10b981"></span> <span><strong>🟢 Gateway Central</strong></span></div>
            <div class="legend-item"><span class="dot" style="background:#dc2626"></span> <span><strong>🔴 Botones Pánico</strong></span></div>
            <div class="legend-item"><span class="dot" style="background:#0284c7"></span> <span><strong>🔵 Nodos Perimetrales</strong></span></div>
            <div class="legend-item"><span class="dot" style="background:#d97706"></span> <span><strong>🟠 Subestación Edge</strong></span></div>
            <div class="legend-item"><span class="dot" style="background:#a855f7"></span> <span><strong>🟣 Cámaras (8)</strong></span></div>
            <div class="legend-item"><span class="dot" style="background:#eab308"></span> <span><strong>🟡 Alarmas Acústicas (5)</strong></span></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configurar un sistema de coordenadas plano basado en los píxeles de la imagen original
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -1 });

        // Dimensiones de la imagen para el encuadre matemático
        const bounds = [[0, 0], [750, 1000]]; 
        
        // Carga la imagen del plano
        const image = L.imageOverlay('mapacuadrante.png', bounds).addTo(map);
        map.fitBounds(bounds);

        // ==========================================
        // 1. GATEWAY PRINCIPAL (VERDE)
        // ==========================================
        L.circleMarker([350, 500], { color: '#ffffff', fillColor: '#10b981', fillOpacity: 0.9, radius: 10 })
            .addTo(map).bindPopup("<b>🟢 GATEWAY CENTRAL LORAWAN</b><br>Ubicación: Centro del Cuadrante (Agregador Core).");

        // ==========================================
        // 2. BOTONES DE PÁNICO (ROJOS) - TOTAL: 4
        // ==========================================
        L.circleMarker([450, 680], { color: '#ffffff', fillColor: '#dc2626', fillOpacity: 0.9, radius: 8 }).addTo(map).bindPopup("<b>🚨 BOTÓN DE PÁNICO #1</b>");
        L.circleMarker([220, 310], { color: '#ffffff', fillColor: '#dc2626', fillOpacity: 0.9, radius: 8 }).addTo(map).bindPopup("<b>🚨 BOTÓN DE PÁNICO #2</b>");
        L.circleMarker([620, 520], { color: '#ffffff', fillColor: '#dc2626', fillOpacity: 0.9, radius: 8 }).addTo(map).bindPopup("<b>🚨 BOTÓN DE PÁNICO #3</b>");
        L.circleMarker([120, 480], { color: '#ffffff', fillColor: '#dc2626', fillOpacity: 0.9, radius: 8 }).addTo(map).bindPopup("<b>🚨 BOTÓN DE PÁNICO #4</b>");

        // ==========================================
        // 3. NODOS PERIMETRALES (AZULES) - TOTAL: 5
        // ==========================================
        L.circleMarker([550, 380], { color: '#ffffff', fillColor: '#0284c7', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🔵 SENSOR PERIMETRAL A</b>");
        L.circleMarker([180, 750], { color: '#ffffff', fillColor: '#0284c7', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🔵 SENSOR PERIMETRAL B</b>");
        L.circleMarker([420, 220], { color: '#ffffff', fillColor: '#0284c7', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🔵 SENSOR PERIMETRAL C</b>");
        L.circleMarker([650, 780], { color: '#ffffff', fillColor: '#0284c7', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🔵 SENSOR PERIMETRAL D</b>");
        L.circleMarker([310, 880], { color: '#ffffff', fillColor: '#0284c7', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🔵 SENSOR PERIMETRAL E</b>");

        // ==========================================
        // 4. SUBESTACIÓN EDGE (NARANJA)
        // ==========================================
        L.circleMarker([380, 420], { color: '#ffffff', fillColor: '#d97706', fillOpacity: 0.9, radius: 8 })
            .addTo(map).bindPopup("<b>🟠 PROCESAMIENTO PERIMETRAL EDGE</b><br>Hardware: Raspberry Pi 5 Core.");

        // ==========================================
        // 5. CÁMARAS DE SEGURIDAD (PÚRPURAS) - TOTAL: 8
        // ==========================================
        L.circleMarker([700, 150], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #1</b><br>Monitoreo perimetral noroeste.");
        L.circleMarker([580, 280], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #2</b>");
        L.circleMarker([490, 480], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #3</b>");
        L.circleMarker([320, 600], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #4</b>");
        L.circleMarker([250, 180], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #5</b>");
        L.circleMarker([150, 390], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #6</b>");
        L.circleMarker([400, 820], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #7</b>");
        L.circleMarker([580, 900], { color: '#ffffff', fillColor: '#a855f7', fillOpacity: 0.9, radius: 6 }).addTo(map).bindPopup("<b>🟣 CÁMARA DE SEGURIDAD CCTV #8</b>");

        // ==========================================
        // 6. ALARMAS COMUNITARIAS / ACÚSTICAS (AMARILLAS) - TOTAL: 5
        // ==========================================
        L.circleMarker([660, 360], { color: '#ffffff', fillColor: '#eab308', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🟡 ALARMA ACÚSTICA #1</b><br>Sirena de disuasión rápida.");
        L.circleMarker([520, 580], { color: '#ffffff', fillColor: '#eab308', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🟡 ALARMA ACÚSTICA #2</b>");
        L.circleMarker([300, 250], { color: '#ffffff', fillColor: '#eab308', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🟡 ALARMA ACÚSTICA #3</b>");
        L.circleMarker([190, 550], { color: '#ffffff', fillColor: '#eab308', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🟡 ALARMA ACÚSTICA #4</b>");
        L.circleMarker([460, 890], { color: '#ffffff', fillColor: '#eab308', fillOpacity: 0.9, radius: 7 }).addTo(map).bindPopup("<b>🟡 ALARMA ACÚSTICA #5</b>");

        // ==========================================
        // 7. INDICADOR CAI PARKWAY
        // ==========================================
        const caiIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div class='cai-label'>CAI Parkway ➡️</div>",
            iconSize: [120, 30],
            iconAnchor: [0, 15]
        });
        
        L.marker([380, 960], { icon: caiIcon }).addTo(map)
            .bindPopup("<b>🖥️ Destino del Flujo de Datos</b><br>Dirección del CAI Parkway hacia donde se despachan las interrupciones críticas.");
            
    </script>
</body>
</html>
